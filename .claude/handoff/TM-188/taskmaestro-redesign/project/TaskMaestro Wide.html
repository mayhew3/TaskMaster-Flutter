// ============================================================
// Theme application — match the phone artboard's locked Tweaks
// (bgDarkness 0.35, cardSaturation 1.0, cardDarkness 0.08).
// ============================================================
function applyTheme(bgDarkness, cardSaturation, cardDarkness) {
  const cardR = 44, cardG = 116, cardB = 197;
  const lum = 0.299*cardR + 0.587*cardG + 0.114*cardB;
  let sR = Math.round(lum + (cardR - lum) * cardSaturation);
  let sG = Math.round(lum + (cardG - lum) * cardSaturation);
  let sB = Math.round(lum + (cardB - lum) * cardSaturation);
  const cd = cardDarkness ?? 0;
  sR = Math.round(sR * (1 - cd));
  sG = Math.round(sG * (1 - cd));
  sB = Math.round(sB * (1 - cd));
  const t = bgDarkness;
  const bgR = Math.round(sR * (1-t) + 0 * t);
  const bgG = Math.round(sG * (1-t) + 0 * t);
  const bgB = Math.round(sB * (1-t) + 0 * t);
  const t2 = Math.min(1, t + 0.18);
  const dR = Math.round(sR * (1-t2));
  const dG = Math.round(sG * (1-t2));
  const dB = Math.round(sB * (1-t2));
  document.documentElement.style.setProperty('--card', `rgb(${sR},${sG},${sB})`);
  document.documentElement.style.setProperty('--bg', `rgb(${bgR},${bgG},${bgB})`);
  document.documentElement.style.setProperty('--bg-deep', `rgb(${dR},${dG},${dB})`);
}

// ============================================================

  const taskSelectedId = state === 'task' || state === 'vo-collapsed' ? 'b' : null;

  const sidebarWidth = narrow ? 222 : 264;
  const editorWidth = narrow ? 332 : 400;

  // Center column width — Direction 1 keeps the list calm at ~720 max.
  const centerMax = narrow ? null : 720;

  let right = null;
  if (state === 'vo-open') {
    right = (
      <div style={{
        width: editorWidth, flexShrink: 0,
        background: 'var(--card)',
        borderLeft: '1px solid rgba(0,0,0,0.18)',

        <ViewOptionsPanel/>

  } else if (state === 'task' || state === 'vo-collapsed') {

    right = <EditorDocked task={t} width={editorWidth}/>;
  } else {
    right = (

        width: editorWidth, flexShrink: 0,
        background: 'var(--bg)',
        borderLeft: '1px solid rgba(0,0,0,0.18)',
        display: 'flex',
      }}>
        <RightPaneEmpty/>
      </div>
    );
  }

  return (
    <WideShell>
      <Sidebar
        activeDest="tasks"
        activeAreaName={activeArea}
        areas={AREAS}
        narrow={narrow}
      />
      <TaskListPane
        tasks={state === 'areas-focus' ? TASKS.filter(t => t.area === 'Family') : TASKS}
        selectedId={taskSelectedId}
        showSprintBanner={showBanner}
        sprint={ACTIVE_SPRINT}
        showViewToggle={true}
        viewOptionsOpen={state === 'vo-open'}
        viewOptions={DEFAULT_VIEW_OPTIONS}
        maxWidth={centerMax}
        title={state === 'areas-focus' ? 'Family' : 'Tasks'}

      />
      {state === 'vo-collapsed' && !narrow && <ViewOptionsHandle summary="Date · Priority ↓"/>}

    </WideShell>

};

    <DesignCanvas
      title="TaskMaestro · Wide-screen layout (medium + expanded)"
      subtitle="Two directions for landscape — Navigation-forward (sidebar) and Master-detail (NavigationRail). Same V9 card, editor fields, brand chrome, and theme tokens as the phone artboard. Open Tweaks (top-right) to verify color parity."
    >
      <DCSection id="approach" title="00. Approach + reference">
        <DCArtboard id="approach-card" label="Approach" width={420} height={300}>
          <div style={{ padding: 20 }}><ApproachCard/></div>
        </DCArtboard>
        <DCArtboard id="states-card" label="States legend" width={420} height={300}>
          <div style={{ padding: 20 }}><StatesCard/></div>
        </DCArtboard>
        <DCArtboard id="phone-ref" label="Phone reference · 393 (locked)" width={393} height={852}>
          <PhoneReferenceFrame/>
        </DCArtboard>
      </DCSection>

      <DCSection id="dir1" title="01. Direction A — Navigation-forward · Expanded 1440">
        <DCArtboard id="d1-card" label="What's here" width={420} height={300}>
          <div style={{ padding: 20 }}>
            <DirectionCard n="A" title="Sidebar + center + right pane" accent="#9DC8F0"
              sub={<>
                Prominent left <b>Sidebar</b> in brand-blue chrome with all destinations, sprints, areas, and locked placeholders for upcoming Yearly Goals / Monthly / Projects. Center is the V9 list constrained to a calm <b>~720 max-width</b> column. Right pane is the contextual surface — editor when a task is selected, view-options when toggled, an on-brand empty state otherwise.
              </>}/>
          </div>
        </DCArtboard>
        <DCArtboard id="d1-empty" label="State 1 · Nothing selected" width={1440} height={900}>
          <Dir1Screen state="empty"/>
        </DCArtboard>
        <DCArtboard id="d1-task" label="State 2 · Task selected → editor populated" width={1440} height={900}>
          <Dir1Screen state="task"/>
        </DCArtboard>
        <DCArtboard id="d1-vo-open" label="State 3a · View options OPEN" width={1440} height={900}>
          <Dir1Screen state="vo-open"/>
        </DCArtboard>
        <DCArtboard id="d1-vo-collapsed" label="State 3b · View options COLLAPSED (handle visible)" width={1440} height={900}>
          <Dir1Screen state="vo-collapsed"/>
        </DCArtboard>
        <DCArtboard id="d1-areas" label="State 4 · Areas + sprint focus (Family filter)" width={1440} height={900}>
          <Dir1Screen state="areas-focus"/>
        </DCArtboard>
        <DCArtboard id="d1-tablet" label="Medium 1024 · tablet" width={1024} height={760}>
          <Dir1Screen state="task" narrow/>
        </DCArtboard>
      </DCSection>

      <DCSection id="dir2" title="02. Direction B — Master-detail · Expanded 1440">
        <DCArtboard id="d2-card" label="What's here" width={420} height={300}>
          <div style={{ padding: 20 }}>
            <DirectionCard n="B" title="Lean NavigationRail + master + detail" accent="#E2A6F0"
              sub={<>
                Compact <b>NavigationRail</b> in brand-blue chrome (icon + label, active dark pill — same as the bottom-nav) for Plan / Tasks / Family / Stats + an <b>Areas</b> entry that opens a secondary drawer with sprints and the upcoming Goals / Monthly / Projects placeholders. Center list runs wider. Right pane is a dedicated editor that stays put while you move through the list. View-options appears as a slim third region.
              </>}/>
          </div>
        </DCArtboard>
        <DCArtboard id="d2-empty" label="State 1 · Nothing selected" width={1440} height={900}>
          <Dir2Screen state="empty"/>
        </DCArtboard>
        <DCArtboard id="d2-task" label="State 2 · Task selected → editor populated" width={1440} height={900}>
          <Dir2Screen state="task"/>
        </DCArtboard>
        <DCArtboard id="d2-vo-open" label="State 3a · View options OPEN (slim 3rd region)" width={1440} height={900}>
          <Dir2Screen state="vo-open"/>
        </DCArtboard>
        <DCArtboard id="d2-vo-collapsed" label="State 3b · View options COLLAPSED (handle visible)" width={1440} height={900}>
          <Dir2Screen state="vo-collapsed"/>
        </DCArtboard>
        <DCArtboard id="d2-areas" label="State 4 · Areas drawer + sprint banner" width={1440} height={900}>
          <Dir2Screen state="areas-focus"/>
        </DCArtboard>
        <DCArtboard id="d2-tablet" label="Medium 1024 · tablet" width={1024} height={760}>
          <Dir2Screen state="task" narrow/>
        </DCArtboard>
      </DCSection>

      <DCSection id="notes" title="03. Notes — what's reused vs. new">
        <DCArtboard id="reuse-card" label="Reused from phone (verbatim)" width={420} height={360}>
          <div style={{ padding: 20 }}>
            <div className="legend-card">
              <h3>Reused verbatim from the phone</h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: 12.5 }}>
                <div>· V9 task card (area stripe, date pill, points, priority 1–5 bar, fixed-width right cluster, log-scale time bar, project header strip)</div>
                <div>· Editor fields + grouping (Task name, Area, Contexts, Priority/Points/Length, all 4 dates, Repeat, Notes)</div>
                <div>· Uppercase letter-spaced section headers</div>
                <div>· Brand palette tokens (#2C74C5 card, derived --bg, #C45EE0 FAB, #D83AFF completed)</div>
                <div>· Open Sans, all text tiers</div>
                <div>· The active dark rounded-pill treatment</div>
                <div>· The 56px rounded magenta FAB (now lives inside the sidebar/rail)</div>
              </div>
            </div>
          </div>
        </DCArtboard>
        <DCArtboard id="new-card" label="New for wide" width={420} height={360}>
          <div style={{ padding: 20 }}>
            <div className="legend-card">
              <h3>New surfaces for the wide layout</h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: 12.5 }}>
                <div>· <b>Sidebar</b> (Direction A) — destinations, sprints, areas, "Coming Soon" placeholders</div>
                <div>· <b>NavigationRail</b> + Areas drawer (Direction B)</div>
                <div>· <b>Docked editor pane</b> — the full-screen editor, relaid out for a tall narrow column. No back chevron; close button + dedicated header strip; popups (Area / Contexts / Dates) overlay the pane, not the screen.</div>
                <div>· <b>View options side panel</b> — same controls as the phone bottom sheet, plus a collapsed handle + summary chip bar.</div>
                <div>· <b>SprintBanner</b> — surfaces the active sprint in the center column when relevant.</div>
                <div>· <b>RightPaneEmpty</b> — on-brand placeholder for the right pane.</div>
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>

    <TweaksPanel title="Tweaks">
      <TweakSection label="Color (matches phone artboard tokens)">
        <TweakSlider
          label="Background darkness"
          value={Math.round(tweaks.bgDarkness * 100)}
          min={15} max={85} step={1} unit="%"
          onChange={(v) => setTweak('bgDarkness', v / 100)}
        />
        <TweakSlider
          label="Card saturation"
          value={Math.round(tweaks.cardSaturation * 100)}
          min={40} max={120} step={1} unit="%"
          onChange={(v) => setTweak('cardSaturation', v / 100)}
        />
        <TweakSlider
          label="Card darkness"
          value={Math.round((tweaks.cardDarkness || 0) * 100)}
          min={0} max={50} step={1} unit="%"
          onChange={(v) => setTweak('cardDarkness', v / 100)}
        />
      </TweakSection>
    </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
