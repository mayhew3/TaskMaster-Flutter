<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Brand colors</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="row" style="gap:20px">
      <div class="col" style="align-items:flex-start">
        <div class="swatch" style="background:var(--brand-blue)"></div>
        <div class="name">Brand blue</div>
        <div class="hex">#2C74C5</div>
      </div>
      <div class="col" style="align-items:flex-start">
        <div class="swatch" style="background:var(--card)"></div>
        <div class="name">Card surface</div>
        <div class="hex">#296BB5</div>
      </div>
      <div class="col" style="align-items:flex-start">
        <div class="swatch" style="background:var(--brand-magenta)"></div>
        <div class="name">Brand magenta</div>
        <div class="hex">#D83AFF</div>
      </div>
      <div style="flex:1;color:var(--fg-2);font-size:12.5px;line-height:1.5;max-width:280px">
        Brand blue is the anchor; cards use brand blue darkened 8%. Magenta is reserved for primary action + completion.
      </div>
    </div></div></body></html>
