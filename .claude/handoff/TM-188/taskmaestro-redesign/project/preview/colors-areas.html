<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Area palette</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="col" style="gap:10px">
      
        <div class="row" style="gap:14px">
          <div class="dot" style="background:var(--area-family)"></div>
          <div class="name" style="width:120px">Family</div>
          <div class="hex">#E2A6F0</div>
          <div style="flex:1;color:var(--fg-3);font-size:11.5px">used as a small dot, never a fill</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="dot" style="background:var(--area-maintenance)"></div>
          <div class="name" style="width:120px">Maintenance</div>
          <div class="hex">#F0B97A</div>
          <div style="flex:1;color:var(--fg-3);font-size:11.5px">used as a small dot, never a fill</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="dot" style="background:var(--area-shopping)"></div>
          <div class="name" style="width:120px">Shopping</div>
          <div class="hex">#A6D8B0</div>
          <div style="flex:1;color:var(--fg-3);font-size:11.5px">used as a small dot, never a fill</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="dot" style="background:var(--area-hobby)"></div>
          <div class="name" style="width:120px">Hobby</div>
          <div class="hex">#9FB8FF</div>
          <div style="flex:1;color:var(--fg-3);font-size:11.5px">used as a small dot, never a fill</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="dot" style="background:var(--area-work)"></div>
          <div class="name" style="width:120px">Work</div>
          <div class="hex">#FFC97A</div>
          <div style="flex:1;color:var(--fg-3);font-size:11.5px">used as a small dot, never a fill</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="dot" style="background:var(--area-friends)"></div>
          <div class="name" style="width:120px">Friends</div>
          <div class="hex">#F09FB0</div>
          <div style="flex:1;color:var(--fg-3);font-size:11.5px">used as a small dot, never a fill</div>
        </div>
    </div></div></body></html>
