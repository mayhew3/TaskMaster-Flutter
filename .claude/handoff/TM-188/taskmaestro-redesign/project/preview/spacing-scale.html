<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="col" style="gap:8px">
      
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-1</div>
          <div style="height:14px;width:12px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">3px</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-2</div>
          <div style="height:14px;width:24px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">6px</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-3</div>
          <div style="height:14px;width:40px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">10px</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-4</div>
          <div style="height:14px;width:56px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">14px</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-5</div>
          <div style="height:14px;width:72px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">18px</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-6</div>
          <div style="height:14px;width:88px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">22px</div>
        </div>
        <div class="row" style="gap:14px">
          <div class="lbl" style="width:60px">sp-7</div>
          <div style="height:14px;width:120px;background:var(--brand-magenta);border-radius:3px"></div>
          <div class="hex">30px</div>
        </div>
    </div></div></body></html>
