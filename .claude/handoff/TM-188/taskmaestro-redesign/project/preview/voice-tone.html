<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Voice + tone</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="col" style="gap:14px;max-width:380px">
      <div>
        <div class="lbl" style="color:var(--date-start-fg);margin-bottom:6px">on-brand</div>
        <div style="font:500 13.5px/1.5 var(--font-sans);color:var(--fg-1);font-style:italic">"No dates set"</div>
        <div style="font:500 13.5px/1.5 var(--font-sans);color:var(--fg-1)">Tap a row to set or clear · all dates optional</div>
      </div>
      <div style="height:1px;background:var(--hairline)"></div>
      <div>
        <div class="lbl" style="color:var(--date-due-fg);margin-bottom:6px">off-brand</div>
        <div style="font:500 13.5px/1.5 var(--font-sans);color:var(--fg-3);text-decoration:line-through">"🎉 Awesome! You've crushed it!"</div>
        <div style="font:500 13.5px/1.5 var(--font-sans);color:var(--fg-3);text-decoration:line-through">Your tasks, supercharged.</div>
      </div>
    </div></div></body></html>
