<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="row" style="gap:18px;padding:8px 0">
      <div class="col" style="align-items:center;gap:10px">
        <button style="background:var(--brand-magenta);color:#fff;border:none;border-radius:12px;padding:13px 24px;font:700 14px var(--font-sans);box-shadow:var(--shadow-cta);cursor:pointer">Save</button>
        <div class="lbl">cta · magenta glow</div>
      </div>
      <div class="col" style="align-items:center;gap:10px">
        <div style="width:14px;height:14px;background:var(--date-target-fg);border-radius:50%;box-shadow:var(--shadow-marker)"></div>
        <div class="lbl">marker · color-matched</div>
      </div>
      <div class="col" style="flex:1;color:var(--fg-3);font-size:11.5px;line-height:1.5">
        Shadows are sparing. Only the magenta CTA and selected timeline markers carry color-matched glows. Cards use an inset top highlight, not a drop shadow.
      </div>
    </div></div></body></html>
