<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Card surface</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div style="background:var(--card);border-radius:12px;padding:14px;box-shadow:inset 0 1px 0 0 var(--bevel-top);max-width:340px">
      <div class="row" style="justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="row" style="gap:8px;margin-bottom:4px">
            <div class="dot" style="background:var(--area-family);width:9px;height:9px"></div>
            <div class="lbl" style="color:var(--fg-3)">Family</div>
          </div>
          <div style="font:500 17px var(--font-sans);color:var(--fg-1);letter-spacing:-0.2px">Visit 905 Haddon Drive</div>
          <div class="row" style="gap:10px;margin-top:8px;font:500 12px var(--font-sans);color:var(--fg-2);font-feature-settings:'tnum'">
            <span style="color:var(--date-target-fg)">May 6</span>
            <span>30m</span>
            <span>5p</span>
          </div>
        </div>
        <div style="width:24px;height:24px;border:2px solid rgba(255,255,255,0.4);border-radius:50%;flex-shrink:0;margin-top:4px"></div>
      </div>
    </div></div></body></html>
