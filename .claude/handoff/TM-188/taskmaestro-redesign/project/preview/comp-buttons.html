<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="row" style="gap:12px;flex-wrap:wrap">
      <button style="background:var(--brand-magenta);color:#fff;border:none;border-radius:12px;padding:13px 22px;font:700 14px var(--font-sans);box-shadow:var(--shadow-cta);cursor:pointer">Save</button>
      <button style="background:rgba(255,255,255,0.08);color:var(--fg-1);border:1px solid rgba(255,255,255,0.14);border-radius:12px;padding:13px 22px;font:600 14px var(--font-sans);cursor:pointer">Cancel</button>
      <button style="background:transparent;color:var(--fg-2);border:1px dashed rgba(255,255,255,0.25);border-radius:10px;padding:9px 14px;font:500 12px var(--font-sans);cursor:pointer">+ Add new</button>
    </div>
    <div class="lbl" style="margin-top:14px">primary · secondary · add-new (dashed)</div></div></body></html>
