<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Pills + chips</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg-1);font:500 14px var(--font-sans);}
  .frame{padding:18px 20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{width:64px;height:64px;border-radius:10px;box-shadow:inset 0 1px 0 0 var(--bevel-top);}
  .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .hex{font:600 11px var(--font-mono);color:var(--fg-3);letter-spacing:0.3px;}
  .lbl{font:700 10.5px var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;color:var(--fg-3);}
  .name{font:600 13px var(--font-sans);color:var(--fg-1);}
</style></head><body><div class="frame">
    <div class="col" style="gap:12px;align-items:flex-start">
      <div class="row" style="gap:6px;flex-wrap:wrap">
        <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:var(--fg-1);font:500 12px var(--font-sans)">Email</span>
        <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:var(--fg-1);font:500 12px var(--font-sans)">Computer</span>
        <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:var(--fg-1);font:500 12px var(--font-sans)">Reading</span>
      </div>
      <div class="row" style="gap:6px;flex-wrap:wrap">
        <span style="padding:5px 10px;border-radius:999px;background:var(--date-start-bg);border:1px solid var(--date-start-border);color:var(--date-start-fg);font:600 11px var(--font-sans)">Start · Apr 28</span>
        <span style="padding:5px 10px;border-radius:999px;background:var(--date-target-bg);border:1px solid var(--date-target-border);color:var(--date-target-fg);font:600 11px var(--font-sans)">Target · May 6</span>
        <span style="padding:5px 10px;border-radius:999px;background:var(--date-due-bg);border:1px solid var(--date-due-border);color:var(--date-due-fg);font:600 11px var(--font-sans)">Due · May 12</span>
      </div>
    </div></div></body></html>
