name: taskmaestro
description: Tasks evolved.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 0.1.3

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  datetime_picker_formfield: ^2.0.1
  http: ^1.6.0
  intl: ^0.20.2
  jiffy: ^6.4.4
  google_sign_in: ^7.2.0
  # TM-361: Firebase family v6 absorbed in this PR.
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  flutter_app_badger: ^1.5.0
  timeago: ^3.1.0
  characters: ^1.4.0
  # TM-361: flutter_platform_widgets discontinued. Bumped to the last
  # release for now; full migration off the package is tracked separately.
  flutter_platform_widgets: ^10.0.1
  yaml: ^3.1.0
  json_annotation: ^4.11.0
  logging: ^1.3.0

  meta: '>=1.1.0 <2.0.0'
  built_value: ^8.10.1
  built_collection: ^5.0.0
  random_string: ^2.3.1

  # Riverpod for state management. TM-361: bumped to 3.x — Riverpod 2.x
  # is incompatible with Flutter 3.41's flutter_test (analyzer 8+
  # cascade). Migration was forced by the SDK upgrade.
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  rxdart: ^0.28.0  # For stream combining (parallel loading)

  # Freezed for immutable models (migration from built_value).
  # TM-361: forced to 3.x by analyzer cascade from the SDK upgrade.
  freezed_annotation: ^3.1.0

  # go_router for navigation. TM-361: 14.x → 17.x absorbed in this PR.
  go_router: ^17.2.3

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9

  collection: any
  timezone: ^0.11.0
  cloud_firestore: ^6.3.0

  # CSV export for debugging tools
  csv: ^8.0.0
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0

  # Drift (local SQLite database for offline-first architecture — TM-319)
  drift: ^2.20.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.42
  connectivity_plus: ^7.1.1

  # TM-359: per-surface Group/Sort/Filter selections persisted across
  # app restarts. SharedPreferences (not Drift) because the payload is
  # tiny and one settings table isn't worth a Drift migration.
  shared_preferences: ^2.3.0

# TM-361: win32 6.x switched to the Flutter native_assets build pipeline,
# whose build hook breaks on Windows usernames containing spaces (e.g.
# "Mayhew Seavey") — the unquoted PATH variable in the cl.exe invocation
# parses `C:\Program Files (x86)\...` as separate args and bails with
# `'C:\Program' is not recognized as an internal or external command`.
# Pinning to win32 ^5 sidesteps the native_assets pipeline entirely;
# share_plus's Windows surface still works because it depends on win32
# via a `>=5.0.0 <8.0.0` range. CI on Linux is unaffected either way.
dependency_overrides:
  win32: ^5.5.4

dev_dependencies:
  test: ^1.25.15
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  mockito: ^5.4.4
  build_runner: ^2.4.0
  built_value_generator: ^8.10.1
  json_serializable: ^6.5.4

  # Riverpod code generation. TM-361: bumped to 4.x with flutter_riverpod 3.
  riverpod_generator: ^4.0.3

  # Drift code generation (TM-319)
  drift_dev: ^2.20.0

  # Freezed code generation. TM-361: forced to 3.x by analyzer cascade.
  freezed: ^3.2.5

  cloud_firestore_platform_interface: any
  flutter_lints: ^6.0.0

  # Testing dependencies
  fake_cloud_firestore: ^4.1.0  # For realistic Firestore mocking in integration tests
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  ios: true
  android: true
  image_path_ios: "assets/launcher/TaskMaestro_Logo.png"
  image_path_android: "assets/launcher/TaskMaestro_Logo.png"
  adaptive_icon_background: "#2B72C2"
  adaptive_icon_foreground: "assets/launcher/TaskMaestro_Logo.png"
  remove_alpha_ios: true
  background_color_ios: "#2B72C2"

flutter_native_splash:
  background_image: "assets/launcher/TaskMaestro_Splash.png"
  android_12:
    # Padded version of the logo (960x960 canvas, icon at 600x600 centered)
    # so the icon fits within the Android 12+ Splash Screen API safe-zone
    # circle (~640px) without being clipped at the edges.
    image: "assets/launcher/TaskMaestro_Logo_AndroidSplash.png"
    color: "#2B72C2"
    icon_background_color: "#2B72C2"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/config/
    - assets/launcher/TaskMaestro_Splash.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
