name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: flutter test
